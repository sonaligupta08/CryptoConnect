<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoConnect Profile</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
	rel="stylesheet">

<style>
body {
	background-color: #000;
	color: #fff;
	font-family: "Poppins", sans-serif;
}

.outer {
	height: 100vh;
}

.sidebar {
	background: #000;
	border-right: 1px solid #2f3336;
	padding: 2rem 1.5rem;
}

.sidebar ul {
	list-style: none;
	padding: 0;
}

.sidebar ul li {
	display: flex;
	gap: 10px;
	padding: 10px;
	cursor: pointer;
	font-size: 1.1rem;
}

.sidebar ul li:hover {
	background: #16181c;
	border-radius: 20px;
	color: #1d9bf0;
}

.profile-header {
	border-bottom: 1px solid #2f3336;
}

.banner {
	height: 180px;
	background: #111;
}

.profile-info {
	padding: 1rem;
	position: relative;
}

.profile-dp {
	width: 130px;
	height: 130px;
	border-radius: 50%;
	border: 4px solid #000;
	position: absolute;
	top: -65px;
	left: 1rem;
	object-fit: cover;
}

.profile-name {
	margin-top: 70px;
	font-size: 1.4rem;
	font-weight: 700;
}

.profile-name, .profile-bio, #editProfileBtn {
	margin-left: 150px;
}

.profile-bio {
	color: #ccc;
}

.tabs {
	display: flex;
	justify-content: space-around;
	border-bottom: 1px solid #2f3336;
}

.tab {
	padding: 12px;
	cursor: pointer;
}

.tab.active {
	border-bottom: 3px solid #1d9bf0;
	color: #1d9bf0;
}
</style>
</head>

<body>
	<div class="container-fluid">
		<div class="row outer">

			<div class="col-md-3 sidebar d-none d-md-block">
				<ul>
					<li onclick="location.href='dashboard.html'"><i
						class='bx bx-home'></i>Home</li>
					<li><i class='bx bx-bell'></i>Notifications</li>
					<li><i class='bx bx-user'></i>Profile</li>
				</ul>
			</div>

			<div class="col-12 col-md-6"
				style="border-left: 1px solid #2f3336; border-right: 1px solid #2f3336; padding: 0">

				<div class="profile-header">
					<div class="banner"></div>

					<div class="profile-info">
						<img id="profileImg" class="profile-dp">
						<h2 id="profileName" class="profile-name"></h2>
						<p class="profile-bio" id="displayBio"></p>

						<button id="editProfileBtn" class="btn btn-outline-primary mt-2">Edit
							Profile</button>
					</div>
				</div>

				<div class="tabs">
					<div class="tab active">Tweets</div>
				</div>

				<div id="user-posts" style="padding: 1rem;"></div>

			</div>

			<div class="col-md-3 d-none d-md-block"></div>

		</div>
	</div>

	<script>
const API_BASE = "http://localhost:8080";

async function loadProfile() {
    const storedUser = JSON.parse(localStorage.getItem("currentUser"));

    if (!storedUser || !storedUser.id) {
        alert("Login first");
        window.location.href = "login.html";
        return;
    }

    try {
        const res = await fetch(`${API_BASE}/api/users/${storedUser.id}`);
        const user = await res.json();
        localStorage.setItem("currentUser", JSON.stringify(user));

        document.getElementById("profileName").innerText = user.username || "No username";
        document.getElementById("displayBio").innerText = user.bio || "No bio yet";

        const img = document.getElementById("profileImg");
        img.src = user.profileImage && user.profileImage !== "null" ? API_BASE + "/" + user.profileImage : "default.png";

        await loadUserPosts(user.id);

    } catch (err) {
        console.error(err);
        alert("Failed to load profile");
    }
}

async function loadUserPosts(userId) {
    const res = await fetch(`${API_BASE}/api/posts/user/${userId}`);
    const posts = await res.json();

    // Sort by createdAt descending
    posts.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

    const container = document.getElementById("user-posts");
    container.innerHTML = "";

    posts.forEach(post => {
        const postDiv = document.createElement("div");
        postDiv.style.borderBottom = "1px solid #2f3336";
        postDiv.style.padding = "1rem 0";
        postDiv.style.display = "flex";
        postDiv.style.flexDirection = "column";

        // Date/Time
        const dateDiv = document.createElement("div");
        dateDiv.innerText = new Date(post.createdAt).toLocaleString("en-IN", {
            day: "2-digit",
            month: "2-digit",
            year: "numeric",
            hour: "2-digit",
            minute: "2-digit",
            hour12: true
        });
        dateDiv.style.color = "#888";
        dateDiv.style.fontSize = "0.75rem";
        dateDiv.style.textAlign = "left";
        postDiv.appendChild(dateDiv);

        // Username
        const userDiv = document.createElement("strong");
        userDiv.innerText = post.username;
        postDiv.appendChild(userDiv);

        // Content
        const contentDiv = document.createElement("div");
        contentDiv.innerText = post.content;
        postDiv.appendChild(contentDiv);

        // Image if exists
        if (post.imageUrl && post.imageUrl !== "null") {
            const img = document.createElement("img");
            img.src = API_BASE + "/" + post.imageUrl;
            img.style.width = "100%";
            img.style.maxHeight = "300px";
            img.style.objectFit = "cover";
            img.style.marginTop = "0.5rem";
            postDiv.appendChild(img);
        }

        container.appendChild(postDiv);
    });
}

loadProfile();
</script>

</body>
</html>
