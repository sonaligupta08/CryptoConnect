<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

<title>Community</title>

<style>
body {
    background: #000;
    color: #fff;
    font-family: "Poppins", sans-serif;
}

.container-main {
    display: flex;
    min-height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 260px;
    border-right: 1px solid #2f3336;
    padding: 2rem;
}

.sidebar ul {
    list-style: none;
    padding: 0;
}

.sidebar li {
    padding: 10px;
    cursor: pointer;
    border-radius: 20px;
}

.sidebar li:hover {
    background: #16181c;
    color: #1d9bf0;
}

/* Content */
.content {
    flex: 1;
    padding: 2rem;
}

/* Create Community Card */
.create-box {
    border: 1px solid #2f3336;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 30px;
}

.create-box input,
.create-box textarea {
    width: 100%;
    background: transparent;
    border: 1px solid #2f3336;
    color: white;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 10px;
}

.create-btn {
    background: #1d9bf0;
    border: none;
    padding: 10px;
    border-radius: 25px;
    width: 150px;
    color: white;
}

/* Community Cards */
.community-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
}

.community-card {
    border: 1px solid #2f3336;
    border-radius: 15px;
    padding: 15px;
    transition: 0.3s;
}

.community-card:hover {
    transform: translateY(-5px);
    border-color: #1d9bf0;
}

.community-header {
    display: flex;
    align-items: center;
    gap: 10px;
}

.community-icon {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: #1d9bf0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}

.community-name {
    font-size: 1.2rem;
    font-weight: 600;
}

.community-desc {
    font-size: 0.9rem;
    color: #aaa;
    margin: 10px 0;
}

.join-btn {
    background: transparent;
    border: 1px solid #1d9bf0;
    color: #1d9bf0;
    padding: 6px 15px;
    border-radius: 20px;
    cursor: pointer;
}

.join-btn.joined {
    background: #1d9bf0;
    color: white;
}
</style>
</head>

<body>

<div class="container-main">

    <!-- Sidebar -->
    <div class="sidebar">
        <ul>
            <li onclick="window.location.href='dashboard.html'"><i class='bx bx-home'></i> Home</li>
            <li><i class='bx bx-group'></i> Communities</li>
            <li onclick="window.location.href='profile.html'"><i class='bx bx-user'></i> Profile</li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="content">

        <h2>Communities</h2>

        <!-- Create Community -->
        <div class="create-box">
            <h5>Create Community</h5>
            <input type="text" id="communityName" placeholder="Community Name">
            <textarea id="communityDesc" rows="2" placeholder="Description"></textarea>
            <button class="create-btn" onclick="createCommunity()">Create</button>
        </div>

        <!-- Community List -->
        <div class="community-grid" id="communityList"></div>

    </div>

</div>

<script>
const API = "http://localhost:8080/api";

async function createCommunity() {
    const name = document.getElementById("communityName").value.trim();
    const desc = document.getElementById("communityDesc").value.trim();

    if (!name) return alert("Community name required");

    const res = await fetch(`${API}/communities/create`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, description: desc })
    });

    if (!res.ok) return alert("Failed");

    document.getElementById("communityName").value = "";
    document.getElementById("communityDesc").value = "";

    loadCommunities();
}

async function loadCommunities() {
    const res = await fetch(`${API}/communities/all`);
    const data = await res.json();

    const container = document.getElementById("communityList");
    container.innerHTML = "";

    data.forEach(c => {
        const div = document.createElement("div");
        div.className = "community-card";

        div.innerHTML = `
            <div class="community-header">
                <div class="community-icon">${c.name.charAt(0)}</div>
                <div class="community-name">${c.name}</div>
            </div>

            <div class="community-desc">${c.description || ""}</div>

            <button class="join-btn" onclick="toggleJoin(this, ${c.id})">Join</button>
        `;

        container.appendChild(div);
    });
}

async function toggleJoin(btn, id) {
    const joined = btn.classList.contains("joined");

    await fetch(`${API}/communities/${id}/${joined ? "leave" : "join"}`, {
        method: "POST"
    });

    btn.classList.toggle("joined");
    btn.innerText = joined ? "Join" : "Joined";
}

loadCommunities();
</script>

</body>
</html>
