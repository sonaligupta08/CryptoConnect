<!DOCTYPE html>
<html>
<head>
<title>Communities</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background: #000;
	color: white;
}

.card {
	background: #111;
	border: 1px solid #2f3336;
}

input, textarea {
	background: #1e1e1e !important;
	color: white !important;
	border: none !important;
}
</style>
</head>

<body class="container mt-4">

	<h2>Communities</h2>

	<!-- CREATE -->
	<div class="card p-3 mb-4">
		<h5>Create Community</h5>

		<input id="communityName" class="form-control mb-2" placeholder="Name">
		<textarea id="communityDesc" class="form-control mb-2"
			placeholder="Description"></textarea>

		<button class="btn btn-success" onclick="createCommunity()">Create</button>
	</div>

	<!-- LIST -->
	<div id="communityList" class="row"></div>

	<script>

const API = "http://localhost:8080/api";
const user = JSON.parse(localStorage.getItem("currentUser"));

loadCommunities();


// CREATE
async function createCommunity(){

    const name = document.getElementById("communityName").value;
    const description = document.getElementById("communityDesc").value;

    if(!name) return alert("Enter name");

    const res = await fetch(`${API}/communities/create`, {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            name: name,
            description: description,
            userId: user.id
        })
    });

    if(!res.ok) return alert("Failed");

    alert("Created");
    loadCommunities();
}

// LOAD USER COMMUNITIES
async function loadCommunities(){

    const res = await fetch(`${API}/communities/user/${user.id}`);
    if(!res.ok) return;

    const data = await res.json();
    const box = document.getElementById("communityList");

    box.innerHTML = "";

    data.forEach(c=>{
        box.innerHTML += `
            <div class="col-md-4 mb-3">
                <div class="card p-3">
                    <h5>${c.name}</h5>
                    <p>${c.description}</p>

                    <button class="btn btn-primary btn-sm"
                        onclick="openCommunity(${c.id})">
                        Open
                    </button>
                </div>
            </div>
        `;
    });
}


// OPEN COMMUNITY (redirect to dashboard with selected id)
function openCommunity(id){
    localStorage.setItem("selectedCommunityId", id);
    window.location.href = "dashboard.html";
}

</script>

</body>
</html>
