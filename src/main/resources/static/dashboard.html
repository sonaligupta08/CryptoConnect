<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script
	src="https://cdn.jsdelivr.net/npm/@joeattardi/emoji-button@3.1.1/dist/index.min.js"></script>
<script
	src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script
	src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<title>Dashboard</title>

<style>
/* --- Styles kept as your original --- */
body {
	margin: 0;
	font-family: "Poppins", sans-serif;
	background-color: #000 !important;
	color: #fff;
}

/* Flex container for sidebar and content */
.outer {
	display: flex;
	min-height: 100vh;
}

/* Sidebar styles */
.sidebar {
	color: #fff !important;
	background-color: #000;
	width: 260px;
	display: flex;
	flex-direction: column;
	justify-content: space-around;
	padding: 2rem 1.5rem;
	border: 1px solid #2f3336;
	height: 100vh;
}

.brand {
	color: #fff;
	text-align: left;
	margin-bottom: 2rem;
}

.sidebar ul {
	list-style: none;
	padding: 0;
}

.sidebar ul li {
	display: flex;
	align-items: center;
	gap: 15px;
	padding: 10px 0;
	font-size: 1.2rem;
	cursor: pointer;
	transition: 0.3s;
}

.sidebar ul li:hover {
	background-color: #16181c;
	border-radius: 25px;
	padding-left: 12px;
	color: #1d9bf0;
}

.profile-section {
	display: flex;
	align-items: center;
	justify-content: space-between;
	background-color: #000;
	border-radius: 50px;
	padding: 10px;
	margin-top: 20px;
}

.profile-pic {
	background-color: #1d9bf0;
	color: #fff;
	width: 38px;
	height: 38px;
	border-radius: 50%;
	display: flex;
	align-items: center;
	justify-content: center;
	font-weight: bold;
}

.username {
	margin: 0;
	font-weight: 600;
}

.handle {
	margin: 0;
	color: #71767b;
	font-size: 0.9rem;
}

.content {
	flex-grow: 1;
	background-color: #000;
	padding: 2rem;
	border-left: 1px solid #2f3336;
	border-right: 1px solid #2f3336;
}

.coin-img {
	border-radius: 50%;
	height: 40px;
	width: 60px;
	object-fit: cover;
	box-shadow: 0 0 50px rgba(63, 121, 227, 0.9);
}

.for-you {
	border: 1px solid #2f3336;
	border-left: none;
	width: 100%;
}

.content-2 {
	flex-grow: 0.5;
	border: 1px solid #2f3336;
	background-color: #000;
}

#input {
	background-color: rgba(0, 0, 0, 0.2);
	padding: 10px;
	width: 100%;
	color: #fff;
	font-size: 1.1rem;
	outline: none;
}

.emojis {
	color: #1d9bf0;
	font-size: 20px;
}

.divide {
	border-bottom: 1px solid #2f3336;
	padding: 1 rem 0;
}

.divide .profile-section {
	display: flex;
	align-items: center;
	gap: 15px;
	background-color: transparent;
	border-radius: 0;
	padding: 0;
	margin: 0;
}

.emojis {
	display: flex;
	align-items: center;
	justify-content: space-between;
	padding: 0.5rem 0;
	color: #1d9bf0;
	font-size: 20px;
}

.post {
	background-color: #fff;
	color: #000;
	border: none;
	border-radius: 50px;
	font-weight: bold;
	font-size: 1rem;
	padding: 12px 0;
	margin-top: 10px;
	cursor: pointer;
	width: 15%;
	transition: 0.3s;
}

.search {
	padding: 12px 0;
	background-color: #000;
	color: white;
}

.connect-img img {
	margin-left: 1px;
	width: 100%;
	height: 300px;
	object-fit: cover;
	border-radius: 0;
}

#input {
	width: 100%;
	border: none;
	outline: none;
	resize: none;
	background: transparent;
	color: white;
	font-size: 1rem;
	overflow-wrap: break-word;
}

.post-card {
	padding: 1rem;
	border-bottom: 1px solid #2f3336;
	color: white;
}

.post-text {
	font-size: 1rem;
	margin-top: 10px;
	white-space: pre-wrap;
}

.action-buttons {
	display: flex;
	align-items: center;
	gap: 2rem;
	padding: 0.5rem 0;
}

.action-buttons button {
	background: transparent;
	color: white;
	border: none;
	font-size: 1.4rem;
	cursor: pointer;
	padding: 5px;
	border-radius: 50%;
	transition: 0.2s;
}

.action-buttons button:hover {
	color: #1d9bf0;
	background-color: rgba(29, 155, 240, 0.15);
}

.posted-img {
	height: 200px;
	width: 200px;
}

#image-preview img {
	width: 200px;
	height: auto;
	border-radius: 12px;
	margin-top: 10px;
	border: 1px solid #2f3336;
}

@media ( max-width : 768px) {
	.content {
		padding: 1rem;
	}
	.divide .profile-section {
		flex-direction: column;
		align-items: flex-start;
	}
	#input {
		width: 100%;
		font-size: 0.95rem;
	}
	.emojis {
		flex-wrap: wrap;
		gap: 10px;
	}
	.wallet-btn, #connectWalletBtn {
		width: 100%;
	}
}

.right-panel {
	position: relative;
	padding: 0;
	overflow: hidden;
	display: flex;
	flex-direction: column;
	justify-content: flex-start;
}

.connect-img {
	position: relative;
}

.connect-img img {
	width: 100%;
	height: 260px;
	object-fit: cover;
	filter: brightness(0.55);
}

.overlay {
	position: absolute;
	top: 0;
	left: 0;
	right: 0;
	bottom: 0;
	background: linear-gradient(to bottom, transparent, rgba(0, 0, 0, 0.9));
}

.welcome-box {
	padding: 25px;
	text-align: left;
}

.welcome-title {
	color: #aaa;
	font-weight: 400;
	margin-bottom: 5px;
}

.brand-title {
	font-size: 2.3rem;
	font-weight: 700;
	background: linear-gradient(90deg, #1d9bf0, #00f5ff);
	-webkit-background-clip: text;
	color: transparent;
	margin-bottom: 15px;
}

.welcome-desc {
	color: #cfcfcf;
	font-size: 0.95rem;
	line-height: 1.5;
	margin-bottom: 20px;
}

.feature-list {
	display: flex;
	flex-direction: column;
	gap: 10px;
	font-size: 0.9rem;
	color: #e5e5e5;
}

.feature-list i {
	color: #1d9bf0;
	margin-right: 8px;
}

.profile-img {
	width: 38px;
	height: 38px;
	border-radius: 50%;
	object-fit: cover;
}

body {
	background-color: #0f172a;
	color: white;
	font-family: 'Segoe UI', sans-serif;
}

.dashboard-stats {
	display: flex;
	gap: 20px;
	margin: 30px;
}

.stat-card {
	background: linear-gradient(145deg, #1e293b, #0f172a);
	padding: 25px;
	border-radius: 16px;
	width: 200px;
	display: flex;
	align-items: center;
	gap: 20px;
	box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
	transition: 0.3s ease;
}

.stat-card:hover {
	transform: translateY(-5px);
}

.stat-icon {
	font-size: 30px;
	color: #3b82f6;
	background: rgba(59, 130, 246, 0.15);
	padding: 15px;
	border-radius: 12px;
}

.stat-info h2 {
	font-size: 28px;
	margin: 0;
	font-weight: bold;
}

.stat-info p {
	margin: 5px 0 0;
	color: #94a3b8;
}
</style>
</head>

<body>
	<div class="container-fluid">
		<div class="row outer">

			<!-- Sidebar -->
			<div class="col-md-3 sidebar d-none d-md-flex flex-column">
				<h2 class="brand">
					<img src="bitcoin.png.png" alt="bitcoin" class="coin-img">
				</h2>

				<div class="menu">
					<ul>
						<li><i class='bx bx-home'></i> Home</li>
						<li><i class='bx bx-bell'></i> Notification</li>
						
						<li onclick="window.location.href='community.html'"><i
							class='bx bx-user'></i> Community</li>

						<li onclick="window.location.href='message.html'"><i
							class='bx bx-message'></i> Messages</li>

						<li onclick="window.location.href='profile.html'"><i
							class='bx bx-user'></i> Profile</li>
					</ul>
				</div>
				<hr>
			</div>

			<!-- Main Content -->
			<div class="col-12 col-md-6 content">
				<h5 id="feedTitle">For You</h5>

				<div class="dashboard-stats">
					<div class="stat-card">
						<div class="stat-icon">
							<i class='bx bx-user'></i>
						</div>
						<div class="stat-info">
							<h2 id="userCount">0</h2>
							<p>Total Users</p>
						</div>
					</div>
				</div>

				<div class="divide">
					<div class="profile-section">
						<div class="profile-pic">?</div>

						<textarea placeholder="What's happening?" id="input" rows="2"></textarea>

						<input type="file" id="imageUpload" accept="image/*"
							style="display: none;">
						<div id="image-preview"></div>
					</div>

					<div class="emojis">
						<a onclick="document.getElementById('imageUpload').click()"> <i
							class="fa-regular fa-image"></i>
						</a> <a><i class='bx bx-smile'></i></a>

						<!-- Post button listener added in JS below -->
						<button class="post" type="button">Post</button>

						<button id="connectWalletBtn" class="btn btn-outline-warning mb-2">
							Connect Wallet</button>

						<p id="walletAddress" style="font-size: 12px; color: #aaa;"></p>
					</div>
				</div>

				<!-- Posts container -->
				<div id="post-feed"></div>
			</div>

			<!-- Right Side -->
			<div class="col-md-3 d-none d-md-block content-2 right-panel">

				<div class="connect-img">
					<img src="connect.jpg" alt="connect">
					<div class="overlay"></div>
				</div>

				<div class="welcome-box">
					<h2 class="welcome-title">Welcome to</h2>
					<h1 class="brand-title">CryptoConnect</h1>

					<p class="welcome-desc">Connect with crypto enthusiasts, share
						insights, and explore blockchain powered conversations.</p>

					<div class="feature-list">
						<div>
							<i class="bx bx-check-circle"></i> Secure blockchain posts
						</div>
						<div>
							<i class="bx bx-check-circle"></i> Real-time chats
						</div>
						<div>
							<i class="bx bx-check-circle"></i> Wallet based identity
						</div>
					</div>

				</div>

			</div>

		</div>
	</div>

	<!-- Mobile Bottom Nav -->
	<nav class="navbar navbar-dark bg-dark d-md-none fixed-bottom">
		<div class="container justify-content-around">
			<a href="#" class="text-light"><i class='bx bx-home'></i></a> <a
				href="#" class="text-light"><i class='bx bx-search'></i></a> <a
				href="#" class="text-light"><i class='bx bx-bell'></i></a> <a
				href="#" class="text-light"><i class='bx bx-user'></i></a>
		</div>
	</nav>
<script>
document.addEventListener("DOMContentLoaded", () => {

    const currentUser = JSON.parse(localStorage.getItem("currentUser") || "{}");
    const USER_ID = currentUser.id;

    const API = "http://localhost:8080/api";
    const API_BASE = "http://localhost:8080/";
    const token = localStorage.getItem("token");

    if (!currentUser.id) {
        alert("Please login first");
        window.location.href = "login.html";
        return;
    }

    const displayName = currentUser.username || "Guest";

    document.querySelectorAll(".username").forEach(el => el.innerText = displayName);
    document.querySelectorAll(".handle").forEach(el => el.innerText = "@" + displayName);

    document.querySelectorAll(".profile-pic").forEach(el => {
        if (currentUser.profileImage) {
            el.innerHTML = `<img src="${API_BASE + currentUser.profileImage}" class="profile-img">`;
        } else {
            el.innerText = displayName.charAt(0).toUpperCase();
        }
    });

    // =========================
    // WALLET CONNECT
    // =========================
    const walletBtn = document.getElementById("connectWalletBtn");
    const walletDisplay = document.getElementById("walletAddress");

    if (walletBtn) {
        walletBtn.addEventListener("click", async () => {
            if (!window.ethereum) return alert("MetaMask not found");

            try {
                const accounts = await ethereum.request({ method: "eth_requestAccounts" });
                const address = accounts[0];
                walletDisplay.innerText = address;

                currentUser.walletAddress = address;
                localStorage.setItem("currentUser", JSON.stringify(currentUser));
            } catch (err) {
                console.error(err);
                alert("Wallet connection failed");
            }
        });
    }

    // =========================
    // DELETE POST FUNCTION (moved outside loadPosts)
    // =========================
    window.deletePost = async function(postId) {
        if (!confirm("Delete this post?")) return;

        const res = await fetch(`${API}/posts/${postId}/delete/${currentUser.id}`, {
            method: "POST",
            headers: token ? { "Authorization": "Bearer " + token } : {}
        });

        if (!res.ok) {
            alert("Delete failed");
            return;
        }

        loadPosts();
    };

    // =========================
    // LOAD POSTS
    // =========================
    async function loadPosts() {
        try {
            const res = await fetch(`${API}/posts/all`, {
                headers: token ? { "Authorization": "Bearer " + token } : {}
            });

            if (!res.ok) return console.error("Post fetch failed:", res.status);

            const posts = await res.json();
            if (!Array.isArray(posts)) return console.error("Invalid post response", posts);

            const container = document.getElementById("post-feed");
            container.innerHTML = "";

            posts.forEach(post => {
                const div = document.createElement("div");
                div.className = "post-card";

                if (post.deleted) {
                    div.innerHTML = `
                        <div class="profile-section">
                            <div class="profile-pic">${post.username.charAt(0)}</div>
                            <div>
                                <p class="username">${post.username}</p>
                                <p class="handle">@${post.username}</p>
                            </div>
                        </div>
                        <p class="post-text" style="color:#71767b;font-style:italic;">
                            This post was deleted
                        </p>
                    `;
                } else {
                    div.innerHTML = `
                        <div class="profile-section">
                            <div class="profile-pic">${post.username.charAt(0)}</div>
                            <div>
                                <p class="username">${post.username}</p>
                                <p class="handle">@${post.username}</p>
                            </div>
                        </div>

                        <p class="post-text">${post.content}</p>

                        ${post.imageUrl ? `<img src="${API_BASE + post.imageUrl}" style="width:100%;border-radius:12px;">` : ""}

                        <div style="margin-top:8px; display:flex; align-items:center; gap:8px;">
                            <button class="like-btn" style="background:none; border:none; color:#fff; cursor:pointer;">
                                <i class="bx bx-heart"></i> <span class="like-count">0</span>
                            </button>
                        </div>

                        ${post.userId === currentUser.id
                            ? `<button onclick="deletePost(${post.id})"
                               style="color:#ff4d4d;background:none;border:none;margin-top:8px;">
                               Delete
                               </button>`
                            : ""}
                    `;
                }

                container.appendChild(div);

                // LIKE BUTTON TOGGLE
                const likeBtn = div.querySelector(".like-btn");
                const likeCountSpan = div.querySelector(".like-count");
                let liked = false;

                if (likeBtn && likeCountSpan) {
                    likeBtn.addEventListener("click", async () => {
                        liked = !liked;
                        likeBtn.querySelector("i").style.color = liked ? "red" : "#fff";

                        let count = parseInt(likeCountSpan.innerText);
                        likeCountSpan.innerText = liked ? count + 1 : count - 1;

                        // optional backend call
                        try {
                            await fetch(`${API}/posts/${post.id}/like`, {
                                method: "POST",
                                headers: {
                                    "Content-Type": "application/json",
                                    "Authorization": token ? "Bearer " + token : ""
                                },
                                body: JSON.stringify({ userId: currentUser.id, liked })
                            });
                        } catch (err) {
                            console.error("Failed to update like", err);
                        }
                    });
                }
            });
        } catch (err) {
            console.error(err);
        }
    }

    // =========================
    // CREATE POST
    // =========================
    const imageInput = document.getElementById("imageUpload");
    let selectedImage = null;

    if (imageInput) {
        imageInput.addEventListener("change", () => {
            const file = imageInput.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = e => {
                selectedImage = e.target.result;
                document.getElementById("image-preview").innerHTML = `<img src="${selectedImage}">`;
            };
            reader.readAsDataURL(file);
        });
    }

    const postButton = document.querySelector(".post");
    if (postButton) {
        postButton.addEventListener("click", async () => {
            const content = document.getElementById("input").value.trim();
            if (!content) return alert("Write something to post!");

            const postHash = btoa(
                (currentUser.walletAddress || "guest") +
                "_" + content +
                "_" + Date.now()
            );

            const formData = new FormData();
            formData.append("userId", currentUser.id);
            formData.append("content", content);
            formData.append("postHash", postHash);
            formData.append("walletAddress", currentUser.walletAddress || "");

            if (imageInput.files[0])
                formData.append("image", imageInput.files[0]);

            try {
                const headers = token ? { "Authorization": "Bearer " + token } : {};
                const res = await fetch(`${API}/posts/create`, {
                    method: "POST",
                    headers,
                    body: formData
                });

                if (!res.ok) {
                    alert("Post failed");
                    return;
                }

                document.getElementById("input").value = "";
                document.getElementById("image-preview").innerHTML = "";
                selectedImage = null;

                loadPosts();
            } catch (err) {
                console.error("Post failed", err);
            }
        });
    }

    // =========================
    // USER COUNT
    // =========================
    async function loadUserCount() {
        try {
            const res = await fetch(`${API}/users/count`);
            const count = await res.json();
            animateCounter("userCount", count);
        } catch (err) {
            console.error(err);
        }
    }

    function animateCounter(id, target) {
        let count = 0;
        const element = document.getElementById(id);
        const interval = setInterval(() => {
            count++;
            element.innerText = count;
            if (count >= target) clearInterval(interval);
        }, 30);
    }

    // =========================
    // SOCKET CONNECTION
    // =========================
    let stompClient = null;
    function connectSocket() {
        const socket = new SockJS("http://localhost:8080/ws?username=" + currentUser.username);
        stompClient = Stomp.over(socket);

        stompClient.connect({ Authorization: "Bearer " + token }, () => {
            stompClient.subscribe("/topic/notifications", msg => {
                const data = JSON.parse(msg.body);
                alert("Notification: " + data.message);
            });
        }, err => {
            console.error("WebSocket failed:", err);
        });
    }

    // =========================
    // INITIAL LOAD
    // =========================
    loadPosts();
    loadUserCount();
    connectSocket();

});
</script>
</script>

</body>
</html>
