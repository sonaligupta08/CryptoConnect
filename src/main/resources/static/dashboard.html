<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="dashboard.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

	<title>Dashboard</title>
</head>

<body>
	<div class="container-fluid">
		<div class="row outer">

			<!--sidebar-->
			<div class="col-md-3 sidebar d-none d-md-flex flex-column">
				<h2 class="brand"><img src="bitcoin.png.png" alt="bitcoin" class="coin-img "></h2>
				<ul>
					<li><i class='bx bx-home'></i>Home</li>
					<li><i class='bx bx-bell'></i>Notification</li>
					<li><i class='bx bx-bell'></i>Messages</li>
					<li><i class='bx bx-group'></i> Communities</li>
					<li><i class='bx bx-user'></i>profile</li>
				</ul>

				<button class="post-btn">Post</button>

				<div class="profile-section">
					<div class="profile-pic">?</div>
					<div>
						<p class="username">Guest</p>
						<p class="handle">@guest_user</p>
					</div>
					<i class='bx bx-dots-horizontal-rounded'></i>
				</div>
			</div>

			<!--Main content-->
			<div class="col-12 col-md-6 content">
				<h5>For You</h5>
				<div class="for-you"></div>
				<div class="divide">
					<div class="profile-section">
						<div class="profile-pic">?</div>
						<textarea placeholder="What's happening?" id="input" rows="2"></textarea>

					</div>
					<div class="emojis">
						<a><i class="fa-regular fa-image"></i></a>
						<a><i class='bx bx-smile'></i></a>
						<a><i class='bx bx-photo-album'></i> </a>
						<a><i class='bx bx-bar-chart-alt'></i></a>
						<button class="post">Post</button>
					</div>
				</div>
				<div id="post-feed"></div>
			</div>

		

			<!--right section-->
			<div class="col-md-3 d-none d-md-block content-2" id="left">
				<div class="connect-img">
					<img src="connect.jpg" alt="connect">
				</div>
				<h1 class="text">Welcome To</h1>
				<h1 class="text">CryptoConnect!!</h1>
			</div>

		</div>
	</div>
	<nav class="navbar navbar-dark bg-dark d-md-none fixed-bottom">
		<div class="container justify-content-around">
			<a href="#" class="text-light"><i class='bx bx-home'></i></a>
			<a href="#" class="text-light"><i class='bx bx-search'></i></a>
			<a href="#" class="text-light"><i class='bx bx-bell'></i></a>
			<a href="#" class="text-light"><i class='bx bx-user'></i></a>
		</div>
	</nav>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script>
		const postBtn = document.querySelector(".post");
		const inputBox = document.getElementById("input");
		const postFeed = document.getElementById("post-feed");

		postBtn.addEventListener("click", () => {

			const text = inputBox.value.trim();

			if (text === "") {
				alert("Type something first");
				return;
			}
			const postDiv = document.createElement("div");
			postDiv.classList.add("post-card");

			postDiv.innerHTML = `
				<div class = "profile-section">
					<div class="profile-pic">?</div>
					<div>
					      <p class="username">Guest</p>
					      <p class="handle">@guest_user</p>
					</div>
				</div>
				<p class="post-text">${text}</p>
				 <hr style="border-color:#2f3336;">
		 `;
			postFeed.prepend(postDiv);
			inputBox.value = "";
		});
	</script>
</body>

</html>
