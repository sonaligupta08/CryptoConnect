<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup</title>
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
body {
	background: radial-gradient(circle at top, #001a33, #000 60%);
	min-height: 100vh;
}

img {
	height: 60px;
	width: 60px;
	border-radius: 50%;
}

.logo {
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	margin-top: 1.5rem;
}

#form-container {
	max-width: 400px;
	padding: 2rem;
	border-radius: 10px;
	margin: 4rem auto;
	background-color: #0B4D99;
	opacity: 0;
	transform: translateY(40px);
	animation: fade 2s ease forwards;
	box-shadow: 0 0 30px rgb(159, 85, 85);
	border: 1px solid rgba(0, 191, 255, .3);
	backdrop-filter: blur(12px);
}

@keyframes fade {from { opacity:0;
	transform: translateY(40px);
}

to {
	opacity: 1;
	transform: translateY(0);
}

}
label {
	color: white;
}

.input-group-text {
	cursor: pointer;
	background: #062b55;
	border: none;
	color: white;
}

.form-control:focus {
	box-shadow: 0 0 10px #00bfff;
	border-color: #00bfff;
}

.strength-bar {
	height: 6px;
	border-radius: 10px;
	margin-top: 6px;
	background: #222;
	overflow: hidden;
}

.strength-fill {
	height: 100%;
	width: 0%;
	transition: .3s;
}

.msg {
	font-size: .85rem;
	margin-top: 5px;
	display: none;
}

.success {
	color: lime;
}

.error {
	color: #ff4d4d;
}

.loading {
	pointer-events: none;
	opacity: .7;
}
</style>
</head>

<body>
	<div id="form-container">
		<a href="index.html" class="btn btn-light mb-3"> <i
			class="fa-solid fa-arrow-left"></i> Go Back
		</a>

		<div class="logo">
			<img src="bitcoin.png.png" alt="bitcoin" class="coin-img me-2">
		</div>

		<form id="signup-form">
			<div id="formMsg" class="msg text-center"></div>

			<div class="mb-3">
				<label for="email">Email</label> <input type="email" id="email"
					placeholder="Enter your email" class="form-control" required>
			</div>

			<div class="mb-3">
				<label>Password</label>
				<div class="input-group">
					<input type="password" id="password" class="form-control" required>
					<span class="input-group-text" id="togglePass"> <i
						class="fa fa-eye"></i>
					</span>
				</div>

				<div class="strength-bar">
					<div class="strength-fill" id="strengthFill"></div>
				</div>

				<div class="msg error" id="passMsg"></div>
			</div>

			<div class="mb-3">
				<label for="confirmPassword">Re-enter Password</label> <input
					type="password" id="confirmPassword"
					placeholder="Re-enter your password" class="form-control" required>
			</div>

			<div class="mb-3">
				<label for="age">Age</label> <input type="number" id="age"
					class="form-control" placeholder="Enter your age" min="18"
					max="120" required>
			</div>

			<button type="submit" class="btn btn-primary w-100 mt-2">Sign
				Up</button>
		</form>
	</div>

	<script type="module">

        const togglePass = document.getElementById("togglePass");
        const passwordInput = document.getElementById("password");

        togglePass.onclick = () => {
            passwordInput.type = passwordInput.type === "password" ? "text" : "password";
            togglePass.innerHTML = passwordInput.type === "password"
                ? '<i class="fa fa-eye"></i>'
                : '<i class="fa fa-eye-slash"></i>';
        };

const strengthFill = document.getElementById("strengthFill");
const passMsg = document.getElementById("passMsg");

passwordInput.addEventListener("input", () => {
    const val = passwordInput.value;

    const hasLetter = /[A-Za-z]/.test(val);
    const hasNumber = /[0-9]/.test(val);
    const hasSpecial = /[^A-Za-z0-9]/.test(val);
    const isLongEnough = val.length >= 8;

    let message = "";
    let width = "0%";
    let color = "red";

    if (val.length === 0) {
        passMsg.style.display = "none";
        strengthFill.style.width = "0%";
        return;
    }

    if (!isLongEnough) {
        message = "Weak: Minimum 8 characters required.";
        width = "33%";
        color = "red";
    } 
    else if (!hasLetter || !hasNumber) {
        message = "Weak: Must contain both letters and numbers.";
        width = "33%";
        color = "red";
    } 
    else if (hasLetter && hasNumber && !hasSpecial) {
        message = "Medium: Add a special character for stronger security.";
        width = "66%";
        color = "orange";
    } 
    else if (hasLetter && hasNumber && hasSpecial) {
        message = "Strong password.";
        width = "100%";
        color = "lime";
    }

    strengthFill.style.width = width;
    strengthFill.style.background = color;
    passMsg.style.display = "block";
    passMsg.innerText = message;
});

        const formMsg = document.getElementById("formMsg");
        const formContainer = document.getElementById("form-container");

        function showError(msg) {
            formMsg.className = "msg error text-center";
            formMsg.style.display = "block";
            formMsg.innerText = msg;
        }

        function showSuccess(msg) {
            formMsg.className = "msg success text-center";
            formMsg.style.display = "block";
            formMsg.innerText = msg;
        }

        const form = document.getElementById("signup-form");

        form.addEventListener("submit", async (e) => {

            e.preventDefault();
            formContainer.classList.add("loading");
            formMsg.style.display = "none";

            const email = document.getElementById("email").value.trim();
            const password = passwordInput.value.trim();
            const confirmPassword = document.getElementById("confirmPassword").value.trim();
            const age = parseInt(document.getElementById("age").value);

            const emailPattern = /^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[a-z]{2,}$/;

             if (!emailPattern.test(email)) {
             showError("Enter a valid email address");
             formContainer.classList.remove("loading");
              return;
              }

            if (age < 18) {
                showError("You must be 18+");
                formContainer.classList.remove("loading");
                return;
            }

            if (password !== confirmPassword) {
                showError("Passwords do not match");
                formContainer.classList.remove("loading");
                return;
            }

            if (password.length < 8) {
                showError("Password must be at least 8 characters");
                formContainer.classList.remove("loading");
                return;
            }

            try {

                const res = await fetch("http://localhost:8080/api/auth/signup", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password, age })
                });

                const text = await res.text();
                let data;

                try { data = JSON.parse(text); }
                catch {
                    showError("Invalid server response");
                    formContainer.classList.remove("loading");
                    return;
                }

                if (res.ok) {

                    showSuccess("Account created successfully");

                    const user = {
                        id: data.userId,
                        email: email,
                        username: null,
                        bio: "",
                        profileImage: ""
                    };

                    localStorage.setItem("currentUser", JSON.stringify(user));

                    setTimeout(() => {
                        window.location.href = "profilesetup.html";
                    }, 1200);

                } else {
                    showError(data.message || "Signup failed");
                }

            } catch {
                showError("Server connection failed");
            }

            formContainer.classList.remove("loading");
        });

    </script>
</body>

</html>
